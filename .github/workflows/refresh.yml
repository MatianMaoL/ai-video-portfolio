name: Refresh Videos

# 所需 GitHub Secrets:
#   LARK_APP_ID      - 飞书自建应用 App ID
#   LARK_APP_SECRET  - 飞书自建应用 App Secret
#   LARK_BASE_TOKEN  - 多维表格 App Token（网址栏 /base/ 后的字符串）
#   LARK_TABLE_ID    - 子表 Table ID（网址栏 ?table= 后的字符串）

on:
  schedule:
    # 每 12 小时运行一次（避免飞书视频链接超过24小时过期）
    - cron: '0 */12 * * *'
  workflow_dispatch: # 允许在 GitHub 网页上手动点击运行！

jobs:
  refresh-videos:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许 Action 提交代码给仓库

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Refresh Script
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_BASE_TOKEN: ${{ secrets.LARK_BASE_TOKEN }}
          LARK_TABLE_ID: ${{ secrets.LARK_TABLE_ID }}
        run: |
          python refresh.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add api/videos.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto refresh feishu videos" && git push)
